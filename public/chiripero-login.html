<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Chiripero | CHIRIPAPP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#1ea4de;--brand2:#177fbf;--line:#dbe8f2;--text:#0f172a;--muted:#64748b;--bg:#f4f9fd}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);font-family:'Inter',system-ui,Arial;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(15,23,42,.10)}
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap img{height:52px;object-fit:contain}
    .title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center}
    .subtitle{font-size:14px;color:var(--muted);text-align:center;margin-bottom:28px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px}
    .field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;color:var(--text)}
    .field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(30,164,222,.14)}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-login:hover{opacity:.9}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
    .error-msg.show{display:block}
    .footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .footer-link a{color:var(--brand);text-decoration:none;font-weight:600}
    .footer-link a:hover{text-decoration:underline}
    .divider{border:none;border-top:1px solid var(--line);margin:20px 0}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/demo/assets/logo_horizontal_trans.png" alt="CHIRIPAPP"/>
    </div>
    <div class="title">Portal del Chiripero</div>
    <div class="subtitle">Entra a tu cuenta para gestionar tu perfil y anuncio</div>

    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>

    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="tu_usuario" autocomplete="username" autocapitalize="none" spellcheck="false"/>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-login" id="btnLogin" type="button">Entrar</button>

    <hr class="divider"/>
    <div class="footer-link">
      ¿Aún no eres chiripero? <a href="/demo/register.html">Regístrate aquí</a>
    </div>
    <div class="footer-link" style="margin-top:8px">
      <a href="/demo/index.html">← Volver al directorio</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btnLogin');
    const errMsg = document.getElementById('errorMsg');

    function setLoading(v) {
      btn.disabled = v;
      btn.innerHTML = v
        ? '<span class="spinner"></span> Entrando...'
        : 'Entrar';
    }

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      errMsg.classList.remove('show');
      if (!username || !password) {
        errMsg.textContent = 'Escribe tu usuario y contraseña';
        errMsg.classList.add('show');
        return;
      }
      setLoading(true);
      try {
        const r = await fetch('/chiripero/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (!r.ok || !d.ok) {
          errMsg.textContent = 'Usuario o contraseña incorrectos';
          errMsg.classList.add('show');
          setLoading(false);
          return;
        }
        // Guardar sesión en localStorage
        localStorage.setItem('chiripero_session', JSON.stringify(d.chiripero));
        // Redirigir al perfil
        window.location.href = '/demo/chiripero-perfil.html';
      } catch(e) {
        errMsg.textContent = 'Error de conexión. Intenta de nuevo.';
        errMsg.classList.add('show');
        setLoading(false);
      }
    }

    btn.addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    // Si ya hay sesión activa, redirigir
    const sess = localStorage.getItem('chiripero_session');
    if (sess) {
      try {
        const s = JSON.parse(sess);
        if (s?.profile_id) window.location.href = '/demo/chiripero-perfil.html';
      } catch(e) { localStorage.removeItem('chiripero_session'); }
    }
  </script>
</body>
</html>
